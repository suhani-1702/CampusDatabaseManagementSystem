<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="container">
    <h1>Manage Events</h1>
    <p><a href="{{ url_for('admin_dashboard') }}">Back</a></p>

    <section class="card">
      <h2>All Events</h2>
      <ul>
        {% for ev in events %}
          <li>{{ ev.event_name }} - {{ ev.date }} - {{ ev.status }}</li>
        {% endfor %}
      </ul>
    </section>
  </div>
</body>
</html>
